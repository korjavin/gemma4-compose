name: Deploy to Portainer

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y docker.io docker-compose
          docker-compose config

  deploy:
    name: Deploy to Portainer
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Create or update deploy branch
        run: |
          # Create or checkout deploy branch
          git checkout -b deploy 2>/dev/null || git checkout deploy

          # Reset to main/master and add only deployment files
          git reset --hard origin/${{ github.ref_name }}

          # Remove non-essential files from deploy branch
          git rm -rf docs/ .claude/ 2>/dev/null || true

          # Stage deployment files
          git add docker-compose.yml .env.example scripts/

          # Commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update deploy branch from ${{ github.ref_name }}"
            git push origin deploy --force-with-lease || true
          fi

      - name: Trigger Portainer webhook
        if: secrets.PORTAINER_WEBHOOK_URL != ''
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          curl -X POST "$PORTAINER_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"message":"Deployment triggered from GitHub Actions"}' \
            -v
