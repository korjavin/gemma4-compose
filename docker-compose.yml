services:
  vllm:
    image: vllm/vllm-openai:0.4.0
    container_name: ${CONTAINER_NAME:-gemma4-api}
    ports:
      - "${VLLM_API_PORT:-8000}:8000"
    networks:
      - docker
    volumes:
      - ${HF_CACHE_DIR:-./huggingface-cache}:/root/.cache/huggingface/hub:rw
      - ./scripts:/scripts:ro
    environment:
      VLLM_MODEL: ${VLLM_MODEL:-google/gemma-4-9b-4bit}
      VRAM_FRACTION: ${VRAM_FRACTION:-0.9}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      VLLM_DTYPE: ${VLLM_DTYPE:-auto}
      VLLM_QUANTIZATION: ${VLLM_QUANTIZATION:-none}
    entrypoint: /bin/bash
    command: /scripts/init-model.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:${VLLM_API_PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      description: "vLLM OpenAI-compatible API for Gemma-4 model"
      version: "1.0.0"
      maintainer: "gemma4-compose"
      traefik.enable: "true"
      traefik.http.routers.gemma4.rule: "Host(`${TRAEFIK_HOST:-gemma4.local}`)"
      traefik.http.routers.gemma4.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.gemma4.tls.certresolver: "${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      traefik.http.services.gemma4.loadbalancer.server.port: "8000"

volumes:
  gemma4_hf_cache:
    driver: local

networks:
  docker:
    external: true
