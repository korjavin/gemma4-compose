services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: ${CONTAINER_NAME:-gemma4-api}
    ports:
      - "${VLLM_API_PORT:-8000}:8000"
    networks:
      - docker
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/huggingface/hub:rw
      - vllm_data:/workspace
      - ./scripts:/scripts:ro
    environment:
      VLLM_MODEL: ${VLLM_MODEL:-google/gemma-4-9b}
      VLLM_NCCL_TIMEOUT_S: ${VLLM_NCCL_TIMEOUT_S:-600}
      VRAM_FRACTION: ${VRAM_FRACTION:-0.9}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CUDA_VISIBLE_DEVICES: "0"
      VLLM_DTYPE: auto
      VLLM_QUANTIZATION: gptq
    entrypoint: /bin/bash
    command: /scripts/init-model.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      description: "vLLM OpenAI-compatible API for Gemma-4 model"
      version: "1.0.0"
      maintainer: "gemma4-compose"
      traefik.enable: "true"
      traefik.http.routers.gemma4.rule: "Host(`${TRAEFIK_HOST:-gemma4.local}`)"
      traefik.http.routers.gemma4.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.services.gemma4.loadbalancer.server.port: "8000"

volumes:
  vllm_data:
    driver: local

networks:
  docker:
    external: true
