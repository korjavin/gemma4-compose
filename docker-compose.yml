version: "3.8"

services:
  ollama:
    image: ghcr.io/korjavin/gemma4-compose:latest
    container_name: ${CONTAINER_NAME:-gemma4-api}
    ports:
      - "${OLLAMA_API_BIND:-127.0.0.1}:${OLLAMA_API_PORT:-11434}:11434"
    networks:
      - traefik
    volumes:
      - ${MODEL_CACHE_PATH:-/var/lib/docker/volumes/gemma4_ollama/_data}:/root/.ollama:rw
      - ./scripts:/scripts:ro
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma:7b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      # CPU-only (remove if GPU available)
      OLLAMA_CPU_TARGET: ${OLLAMA_CPU_TARGET:-}
    entrypoint: /bin/bash
    command: /scripts/init-model.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 300s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    labels:
      description: "Ollama OpenAI-compatible API for Gemma model"
      version: "1.0.0"
      maintainer: "gemma4-compose"
      traefik.enable: "true"
      traefik.http.routers.gemma4.rule: "Host(`${TRAEFIK_HOST:-gemma4.local}`)"
      traefik.http.routers.gemma4.entrypoints: "${TRAEFIK_ENTRYPOINT:-websecure}"
      traefik.http.routers.gemma4.tls: "true"
      traefik.http.services.gemma4.loadbalancer.server.port: "11434"

networks:
  traefik:
    external: true
    name: ${NETWORK_NAME:-docker}
